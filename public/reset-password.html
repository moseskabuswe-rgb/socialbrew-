<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Reset Password — Social Brew</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, #fdfaf5 0%, #f5ead8 50%, #efe0c4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 28px;
    padding: 40px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }
  .icon { font-size: 56px; margin-bottom: 20px; }
  h1 { color: #3d1a06; font-size: 24px; font-weight: 700; margin-bottom: 10px; }
  p.subtitle { color: #9b7a45; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
  label {
    display: block;
    text-align: left;
    color: #9b7a45;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    background: #fdfaf5;
    color: #3d1a06;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    border: 1.5px solid #e8d9c0;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #c8853a; }
  button.primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #c8853a, #a06428);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 24px;
    box-shadow: 0 4px 16px rgba(200,133,58,0.35);
  }
  button.primary:disabled { opacity: 0.55; cursor: default; box-shadow: none; }
  button.secondary {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: #c8853a;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    text-decoration: underline;
  }
  .status {
    margin-top: 16px;
    font-size: 14px;
    min-height: 22px;
    line-height: 1.4;
  }
  .error { color: #d94f4f; }
  .success { color: #5a9e6a; font-weight: 600; }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint {
    color: #b8956a;
    font-size: 12px;
    text-align: left;
    margin-top: 5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Set New Password</h1>
  <p class="subtitle">Choose a strong password for your Social Brew account.</p>

  <label for="password">New Password</label>
  <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" />
  <p class="hint">Minimum 6 characters</p>

  <label for="confirm">Confirm Password</label>
  <input type="password" id="confirm" placeholder="Repeat your new password" autocomplete="new-password" />

  <button class="primary" id="btn">Update Password ☕</button>
  <button class="secondary" id="backBtn">Back to Sign In</button>

  <div class="status" id="status"></div>
</div>

<script>
const SUPABASE_URL = 'https://pifpkfuulfnweeiqufbq.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZnBrZnV1bGZud2VlaXF1ZmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NjY5ODIsImV4cCI6MjA5MTM0Mjk4Mn0.5jtK3M5Y-ZQdqXlBL1FLxsr10najtUfpQ3pTP8eimpw'

const btn = document.getElementById('btn')
const backBtn = document.getElementById('backBtn')
const statusEl = document.getElementById('status')
const passwordEl = document.getElementById('password')
const confirmEl = document.getElementById('confirm')

function setStatus(msg, type) {
  statusEl.textContent = msg
  statusEl.className = 'status ' + (type || '')
}

// Extract access_token and refresh_token from the URL hash
// Supabase sends these as: #access_token=xxx&refresh_token=yyy&type=recovery
function getTokensFromHash() {
  const hash = window.location.hash.replace('#', '')
  const params = new URLSearchParams(hash)
  return {
    accessToken: params.get('access_token'),
    refreshToken: params.get('refresh_token'),
    type: params.get('type')
  }
}

const { accessToken, refreshToken, type } = getTokensFromHash()

// If there's no access token in the hash, the link is invalid or already used
if (!accessToken || type !== 'recovery') {
  setStatus('This reset link is invalid or has already been used. Please request a new one.', 'error')
  btn.disabled = true
}

backBtn.addEventListener('click', () => {
  window.location.href = 'https://socialbrew-ani.pages.dev'
})

btn.addEventListener('click', async () => {
  const password = passwordEl.value
  const confirm = confirmEl.value

  if (!password || password.length < 6) {
    setStatus('Password must be at least 6 characters.', 'error')
    return
  }
  if (password !== confirm) {
    setStatus('Passwords do not match.', 'error')
    return
  }

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Updating...'
  setStatus('')

  try {
    // Step 1: Set the session using the tokens from the recovery link
    const sessionRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({ refresh_token: refreshToken })
    })

    const sessionData = await sessionRes.json()

    if (!sessionRes.ok || !sessionData.access_token) {
      setStatus('Session expired. Please request a new reset link.', 'error')
      btn.innerHTML = 'Update Password ☕'
      btn.disabled = false
      return
    }

    const freshAccessToken = sessionData.access_token

    // Step 2: Update the password using the fresh access token
    const updateRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${freshAccessToken}`
      },
      body: JSON.stringify({ password })
    })

    const updateData = await updateRes.json()

    if (!updateRes.ok) {
      setStatus(updateData.message || updateData.error_description || 'Update failed. Please try again.', 'error')
      btn.innerHTML = 'Update Password ☕'
      btn.disabled = false
      return
    }

    // Success
    setStatus('✅ Password updated! Taking you back to the app...', 'success')
    btn.innerHTML = '✅ Password Updated'
    btn.style.background = '#5a9e6a'
    btn.style.boxShadow = 'none'

    // Clear the hash from the URL so the token can't be reused
    window.history.replaceState({}, document.title, window.location.pathname)

    // Redirect back to app after a short pause
    setTimeout(() => {
      window.location.href = 'https://socialbrew-ani.pages.dev'
    }, 2000)

  } catch (err) {
    setStatus('Error: ' + err.message, 'error')
    btn.innerHTML = 'Update Password ☕'
    btn.disabled = false
  }
})
</script>
</body>
</html>
